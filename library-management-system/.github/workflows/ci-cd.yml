name: CI/CD Pipeline

on:
  push:
    branches: [main]

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build user-service
        run: mvn package -DskipTests -q
        working-directory: user-service

      - name: Build book-service
        run: mvn package -DskipTests -q
        working-directory: book-service

      - name: Build borrow-service
        run: mvn package -DskipTests -q
        working-directory: borrow-service

      - name: Build notification-service
        run: mvn package -DskipTests -q
        working-directory: notification-service

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build and push Docker images
        run: |
          for svc in user-service book-service borrow-service notification-service frontend; do
            docker build -t ${{ secrets.DOCKER_USERNAME }}/$svc:latest ./$svc
            docker push ${{ secrets.DOCKER_USERNAME }}/$svc:latest
          done

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Set kubeconfig
        run: echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config

      - name: Deploy to Kubernetes
        run: kubectl apply -f k8s/

      - name: Rollout status
        run: |
          for svc in user-service book-service borrow-service notification-service frontend; do
            kubectl rollout status deployment/$svc --timeout=120s
          done
