<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Library Management System</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; color: #333; }

    header {
      background: #1a237e; color: white; padding: 16px 24px;
      display: flex; align-items: center; justify-content: space-between;
    }
    header h1 { font-size: 1.4rem; }

    nav { display: flex; gap: 8px; }
    nav button {
      background: transparent; border: 1px solid rgba(255,255,255,0.5);
      color: white; padding: 6px 14px; border-radius: 4px; cursor: pointer;
      font-size: 0.85rem; transition: background 0.2s;
    }
    nav button:hover, nav button.active { background: rgba(255,255,255,0.2); }

    main { max-width: 860px; margin: 32px auto; padding: 0 16px; }

    .page { display: none; }
    .page.active { display: block; }

    .card {
      background: white; border-radius: 8px; padding: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 24px;
    }
    .card h2 { margin-bottom: 16px; font-size: 1.1rem; color: #1a237e; }

    .form-group { margin-bottom: 14px; }
    label { display: block; font-size: 0.85rem; margin-bottom: 4px; color: #555; }
    input, select {
      width: 100%; padding: 9px 12px; border: 1px solid #ccc;
      border-radius: 4px; font-size: 0.95rem;
    }
    input:focus, select:focus { outline: none; border-color: #1a237e; }

    .btn {
      background: #1a237e; color: white; border: none;
      padding: 10px 20px; border-radius: 4px; cursor: pointer;
      font-size: 0.95rem; transition: background 0.2s;
    }
    .btn:hover { background: #283593; }
    .btn.danger { background: #c62828; }
    .btn.danger:hover { background: #b71c1c; }

    .alert {
      padding: 10px 14px; border-radius: 4px; margin-top: 12px;
      font-size: 0.9rem; display: none;
    }
    .alert.success { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }
    .alert.error { background: #ffebee; color: #c62828; border: 1px solid #ef9a9a; }

    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    th { background: #e8eaf6; color: #1a237e; padding: 10px; text-align: left; }
    td { padding: 10px; border-bottom: 1px solid #eee; }
    tr:last-child td { border-bottom: none; }

    .badge {
      display: inline-block; padding: 2px 10px; border-radius: 12px;
      font-size: 0.78rem; font-weight: 600;
    }
    .badge.available { background: #e8f5e9; color: #2e7d32; }
    .badge.issued { background: #ffebee; color: #c62828; }
  </style>
</head>
<body>

<header>
  <h1>📚 Library Management System</h1>
  <nav>
    <button class="active" onclick="showPage('register')">Register User</button>
    <button onclick="showPage('addBook')">Add Book</button>
    <button onclick="showPage('borrow')">Borrow / Return</button>
    <button onclick="showPage('books')">View Books</button>
  </nav>
</header>

<main>

  <!-- Register User -->
  <div id="register" class="page active">
    <div class="card">
      <h2>Register User</h2>
      <div class="form-group">
        <label>Name</label>
        <input id="userName" type="text" placeholder="Full name" />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input id="userEmail" type="email" placeholder="email@example.com" />
      </div>
      <div class="form-group">
        <label>Role</label>
        <select id="userRole">
          <option value="STUDENT">Student</option>
          <option value="ADMIN">Admin</option>
        </select>
      </div>
      <button class="btn" onclick="registerUser()">Register</button>
      <div id="registerAlert" class="alert"></div>
    </div>

    <div class="card">
      <h2>Registered Users</h2>
      <table>
        <thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Role</th></tr></thead>
        <tbody id="usersTable"><tr><td colspan="4">Loading...</td></tr></tbody>
      </table>
    </div>
  </div>

  <!-- Add Book -->
  <div id="addBook" class="page">
    <div class="card">
      <h2>Add Book</h2>
      <div class="form-group">
        <label>Title</label>
        <input id="bookTitle" type="text" placeholder="Book title" />
      </div>
      <div class="form-group">
        <label>Author</label>
        <input id="bookAuthor" type="text" placeholder="Author name" />
      </div>
      <button class="btn" onclick="addBook()">Add Book</button>
      <div id="bookAlert" class="alert"></div>
    </div>
  </div>

  <!-- Borrow / Return -->
  <div id="borrow" class="page">
    <div class="card">
      <h2>Borrow Book</h2>
      <div class="form-group">
        <label>User ID</label>
        <input id="borrowUserId" type="number" placeholder="User ID" />
      </div>
      <div class="form-group">
        <label>Book ID</label>
        <input id="borrowBookId" type="number" placeholder="Book ID" />
      </div>
      <button class="btn" onclick="borrowBook()">Borrow</button>
      <div id="borrowAlert" class="alert"></div>
    </div>

    <div class="card">
      <h2>Return Book</h2>
      <div class="form-group">
        <label>Book ID</label>
        <input id="returnBookId" type="number" placeholder="Book ID" />
      </div>
      <button class="btn danger" onclick="returnBook()">Return</button>
      <div id="returnAlert" class="alert"></div>
    </div>
  </div>

  <!-- View Books -->
  <div id="books" class="page">
    <div class="card">
      <h2>All Books <button class="btn" style="float:right;padding:6px 14px;font-size:0.85rem" onclick="loadBooks()">Refresh</button></h2>
      <table>
        <thead><tr><th>ID</th><th>Title</th><th>Author</th><th>Status</th></tr></thead>
        <tbody id="booksTable"><tr><td colspan="4">Loading...</td></tr></tbody>
      </table>
    </div>
  </div>

</main>

<script>
  const USER_SVC   = 'http://localhost:8081';
  const BOOK_SVC   = 'http://localhost:8082';
  const BORROW_SVC = 'http://localhost:8083';

  function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    event.target.classList.add('active');
    if (id === 'register') loadUsers();
    if (id === 'books') loadBooks();
  }

  function showAlert(id, msg, type) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.className = `alert ${type}`;
    el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 4000);
  }

  async function registerUser() {
    const name  = document.getElementById('userName').value.trim();
    const email = document.getElementById('userEmail').value.trim();
    const role  = document.getElementById('userRole').value;
    if (!name || !email) return showAlert('registerAlert', 'Name and email are required.', 'error');

    try {
      const res = await fetch(`${USER_SVC}/users`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, role })
      });
      if (!res.ok) throw new Error('Failed');
      showAlert('registerAlert', 'User registered successfully!', 'success');
      document.getElementById('userName').value = '';
      document.getElementById('userEmail').value = '';
      loadUsers();
    } catch (e) {
      showAlert('registerAlert', 'Error: ' + e.message, 'error');
    }
  }

  async function loadUsers() {
    try {
      const res = await fetch(`${USER_SVC}/users`);
      const users = await res.json();
      const tbody = document.getElementById('usersTable');
      tbody.innerHTML = users.length === 0
        ? '<tr><td colspan="4">No users registered yet.</td></tr>'
        : users.map(u => `<tr><td>${u.id}</td><td>${u.name}</td><td>${u.email}</td><td>${u.role}</td></tr>`).join('');
    } catch (e) {
      document.getElementById('usersTable').innerHTML = '<tr><td colspan="4">Could not load users.</td></tr>';
    }
  }

  async function addBook() {
    const title  = document.getElementById('bookTitle').value.trim();
    const author = document.getElementById('bookAuthor').value.trim();
    if (!title || !author) return showAlert('bookAlert', 'Title and author are required.', 'error');

    try {
      const res = await fetch(`${BOOK_SVC}/books`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, author })
      });
      if (!res.ok) throw new Error('Failed');
      showAlert('bookAlert', 'Book added successfully!', 'success');
      document.getElementById('bookTitle').value = '';
      document.getElementById('bookAuthor').value = '';
    } catch (e) {
      showAlert('bookAlert', 'Error: ' + e.message, 'error');
    }
  }

  async function borrowBook() {
    const userId = document.getElementById('borrowUserId').value;
    const bookId = document.getElementById('borrowBookId').value;
    if (!userId || !bookId) return showAlert('borrowAlert', 'User ID and Book ID are required.', 'error');

    try {
      const res = await fetch(`${BORROW_SVC}/borrow`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId: Number(userId), bookId: Number(bookId) })
      });
      if (!res.ok) throw new Error('Book may already be issued or not found.');
      showAlert('borrowAlert', 'Book borrowed successfully!', 'success');
    } catch (e) {
      showAlert('borrowAlert', 'Error: ' + e.message, 'error');
    }
  }

  async function returnBook() {
    const bookId = document.getElementById('returnBookId').value;
    if (!bookId) return showAlert('returnAlert', 'Book ID is required.', 'error');

    try {
      const res = await fetch(`${BORROW_SVC}/return`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ bookId: Number(bookId) })
      });
      if (!res.ok) throw new Error('No active borrow record found for this book.');
      showAlert('returnAlert', 'Book returned successfully!', 'success');
    } catch (e) {
      showAlert('returnAlert', 'Error: ' + e.message, 'error');
    }
  }

  async function loadBooks() {
    try {
      const res = await fetch(`${BOOK_SVC}/books`);
      const books = await res.json();
      const tbody = document.getElementById('booksTable');
      tbody.innerHTML = books.length === 0
        ? '<tr><td colspan="4">No books available.</td></tr>'
        : books.map(b => `
            <tr>
              <td>${b.id}</td>
              <td>${b.title}</td>
              <td>${b.author}</td>
              <td><span class="badge ${b.available ? 'available' : 'issued'}">${b.available ? 'Available' : 'Issued'}</span></td>
            </tr>`).join('');
    } catch (e) {
      document.getElementById('booksTable').innerHTML = '<tr><td colspan="4">Could not load books.</td></tr>';
    }
  }

  // Initial load
  loadUsers();
</script>
</body>
</html>
